<div class="flex flex-wrap gap-3 items-center mb-3 mx-3">
	<div class="text-sm opacity-70">Кликните по дню, чтобы открыть окно.</div>
</div>


<full-calendar #calendar class="mx-3" [options]="calendarOptions"></full-calendar>

<app-employee-calendar-day-modal
	[open]="isDayModalOpen()"
	[dateStr]="selectedDateStr()"
	[employees]="allEmployees()"
	[admins]="admins()"
	[cleaners]="cleaners()"
	[existingAdminAssignments]="existingAdminAssignments()"
	[existingCleaningAssignment]="existingCleaningAssignment()"
	(closed)="closeDayModal()"
	(saveRequested)="saveAssignmentsForSelectedDate($event)"
></app-employee-calendar-day-modal>
